[book]
authors = ["Meshack Bahati Ouma"]
language = "en"
src = "."
title = "Oxidite Documentation"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
git-repository-url = "https://github.com/meshackbahati/rust-oxidite/tree/main/docs/book"
edit-url-template = "https://github.com/meshackbahati/rust-oxidite/edit/main/docs/book/{path}"
site-url = "/docs/book/book/"
additional-css = ["custom.css"]
additional-js = ["branding.js"]

[output.html.playground]
editable = true
copy-js = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
expand = true
heading-split-level = 3
